<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workshop Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e8e6e0;
    --text: #1a1a18;
    --muted: #8a8880;
    --accent: #2d5a27;
    --accent-light: #e8f0e7;
    --accent-hover: #234820;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* AUTH SCREEN */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--shadow);
  }

  .auth-logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  .auth-card h1 {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }

  .auth-card p {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-group input {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .form-group input:focus {
    border-color: var(--accent);
    background: white;
  }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 8px;
  }

  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .auth-error {
    color: #c0392b;
    font-size: 13px;
    margin-top: 12px;
    text-align: center;
  }

  /* MAIN APP */
  #app-screen { display: none; min-height: 100vh; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-logo {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-logout {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-logout:hover { color: var(--text); border-color: var(--text); }

  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* HERO SEARCH */
  .hero {
    text-align: center;
    margin-bottom: 40px;
  }

  .hero h2 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }

  .hero p {
    color: var(--muted);
    font-size: 14px;
  }

  .search-wrap {
    position: relative;
    margin-top: 28px;
  }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  #search-input {
    width: 100%;
    padding: 16px 56px 16px 48px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: var(--sans);
    font-size: 16px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    box-shadow: var(--shadow);
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  #search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(45,90,39,0.1), var(--shadow);
  }

  .search-clear {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    display: none;
    line-height: 1;
    padding: 4px;
  }

  /* SCAN BUTTON */
  .scan-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 16px auto 0;
    padding: 10px 20px;
    background: var(--accent-light);
    color: var(--accent);
    border: 1.5px solid rgba(45,90,39,0.2);
    border-radius: 8px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .scan-btn:hover { background: #dce8db; }

  /* SCANNER */
  #scanner-wrap {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-top: 16px;
    box-shadow: var(--shadow);
  }

  .scanner-header {
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .scanner-header span {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
  }

  .scanner-close {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--muted);
    line-height: 1;
  }

  #scanner-video {
    width: 100%;
    max-height: 280px;
    object-fit: cover;
    display: block;
  }

  .scanner-hint {
    padding: 10px 16px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-chip {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
  }

  .stat-chip strong {
    color: var(--text);
    font-weight: 500;
  }

  /* RESULTS */
  #results-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card:hover {
    border-color: var(--accent);
    box-shadow: 0 2px 12px rgba(45,90,39,0.1);
  }

  .result-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }

  .result-item {
    font-size: 15px;
    font-weight: 500;
    flex: 1;
  }

  .result-box-id {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--accent-light);
    color: var(--accent);
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .result-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .result-meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--muted);
  }

  .result-description {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-style: italic;
  }

  /* BOX DETAIL MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeOverlay 0.2s ease;
  }

  @keyframes fadeOverlay {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--surface);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 720px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 0;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .modal-box-id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .modal-close {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: var(--muted);
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-meta {
    padding: 14px 24px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .modal-meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .modal-meta-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .modal-meta-value {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
  }

  .modal-image {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
    display: block;
  }

  .modal-section {
    padding: 20px 24px;
  }

  .modal-section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .item-list {
    list-style: none;
  }

  .item-list li {
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .item-list li:last-child { border-bottom: none; }

  .item-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }

  .empty-state .icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .empty-state p {
    font-size: 15px;
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 14px;
  }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* RESPONSIVE */
  @media (max-width: 480px) {
    .main { padding: 24px 16px 80px; }
    .hero h2 { font-size: 22px; }
    .auth-card { padding: 32px 24px; }
    .modal { max-height: 92vh; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">⬡ Workshop</div>
    <h1>Sign in</h1>
    <p>Access your workshop inventory</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="login-btn" onclick="handleLogin()">Sign in</button>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-logo">⬡ Workshop Inventory</div>
    <div class="topbar-right">
      <button class="btn-logout" onclick="handleLogout()">Sign out</button>
    </div>
  </div>

  <div class="main">
    <!-- HERO -->
    <div class="hero">
      <h2>Find anything in your shop</h2>
      <p>Search across all boxes, or scan a barcode</p>
      <div class="search-wrap">
        <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search items, e.g. '12v power supply'..." oninput="handleSearch(this.value)" onkeydown="if(event.key==='Escape'){clearSearch()}">
        <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
      </div>
      <button class="scan-btn" onclick="toggleScanner()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
          <rect x="7" y="7" width="10" height="10" rx="1"/>
        </svg>
        Scan barcode
      </button>

      <!-- SCANNER -->
      <div id="scanner-wrap">
        <div class="scanner-header">
          <span>Point camera at barcode</span>
          <button class="scanner-close" onclick="stopScanner()">×</button>
        </div>
        <video id="scanner-video" playsinline autoplay muted></video>
        <canvas id="scanner-canvas" style="display:none"></canvas>
        <div class="scanner-hint">Hold steady — scanning automatically</div>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- RESULTS LABEL -->
    <div id="results-label"></div>

    <!-- RESULTS -->
    <div id="results-container"></div>
  </div>
</div>

<!-- BOX DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-box-id" id="modal-box-id"></div>
        <div class="modal-title" id="modal-title"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <img id="modal-image" class="modal-image" style="display:none" alt="Box contents">
    <div class="modal-section">
      <div class="modal-section-title">Contents</div>
      <ul class="item-list" id="modal-items"></ul>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const SUPABASE_URL = 'https://zjzirhiqqqducjxhvdhs.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Hk1HfakqyFDueOB4-k96wQ_4tut5so-';

// ─── STATE ────────────────────────────────────────────────
let authToken = null;
let searchTimeout = null;
let scannerStream = null;
let scannerInterval = null;
let statsCache = null;

// ─── INIT ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('wh_token');
  if (saved) {
    authToken = saved;
    showApp();
  }
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
});

// ─── AUTH ─────────────────────────────────────────────────
async function handleLogin() {
  const email = document.getElementById('email-input').value.trim();
  const password = document.getElementById('password-input').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('auth-error');

  if (!email || !password) { err.textContent = 'Please enter email and password.'; return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  err.textContent = '';

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Login failed');
    authToken = data.access_token;
    sessionStorage.setItem('wh_token', authToken);
    showApp();
  } catch (e) {
    err.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

function handleLogout() {
  authToken = null;
  sessionStorage.removeItem('wh_token');
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  stopScanner();
}

// ─── APP INIT ─────────────────────────────────────────────
async function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  await loadStats();
}

async function loadStats() {
  try {
    const [boxRes, itemRes] = await Promise.all([
      supaFetch('/rest/v1/boxes?select=box_id&limit=1', { headers: { 'Prefer': 'count=exact' } }),
      supaFetch('/rest/v1/items?select=id&limit=1', { headers: { 'Prefer': 'count=exact' } })
    ]);
    const boxes = boxRes.headers.get('content-range')?.split('/')[1] || '?';
    const items = itemRes.headers.get('content-range')?.split('/')[1] || '?';
    statsCache = { boxes, items };
    document.getElementById('stats-bar').innerHTML = `
      <div class="stat-chip"><strong>${boxes}</strong> boxes</div>
      <div class="stat-chip"><strong>${items}</strong> items</div>
    `;
  } catch(e) {}
}

// ─── SEARCH ───────────────────────────────────────────────
function handleSearch(val) {
  const clear = document.getElementById('search-clear');
  clear.style.display = val ? 'block' : 'none';
  clearTimeout(searchTimeout);
  if (!val.trim()) { showEmpty(); return; }
  searchTimeout = setTimeout(() => searchItems(val.trim()), 300);
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').style.display = 'none';
  showEmpty();
}

function showEmpty() {
  document.getElementById('results-label').textContent = '';
  document.getElementById('results-container').innerHTML = '';
}

async function searchItems(query) {
  const container = document.getElementById('results-container');
  const label = document.getElementById('results-label');
  container.innerHTML = '<div class="loading"><div class="spinner"></div>Searching…</div>';

  try {
    // Search items by name (case insensitive)
    const encoded = encodeURIComponent(`%${query}%`);
    const res = await supaFetch(
      `/rest/v1/items?select=item_name,box_id,boxes(box_id,location,description,box_image_url)&item_name=ilike.${encoded}&limit=80`
    );
    const data = await res.json();

    if (!data.length) {
      label.textContent = '';
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">🔍</div>
          <p>No items found for "<strong>${escHtml(query)}</strong>"</p>
        </div>`;
      return;
    }

    label.textContent = `${data.length} result${data.length !== 1 ? 's' : ''} for "${query}"`;
    container.innerHTML = data.map(item => `
      <div class="result-card" onclick="openBox('${escHtml(item.box_id)}')">
        <div class="result-top">
          <div class="result-item">${escHtml(item.item_name)}</div>
          <div class="result-box-id">${escHtml(item.box_id)}</div>
        </div>
        <div class="result-meta">
          ${item.boxes?.location ? `<div class="result-meta-item">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${escHtml(item.boxes.location)}
          </div>` : ''}
        </div>
        ${item.boxes?.description ? `<div class="result-description">${escHtml(item.boxes.description)}</div>` : ''}
      </div>
    `).join('');
  } catch(e) {
    container.innerHTML = `<div class="empty-state"><p>Error searching. Please try again.</p></div>`;
  }
}

// ─── BOX DETAIL ───────────────────────────────────────────
async function openBox(boxId) {
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-box-id').textContent = boxId;
  document.getElementById('modal-title').textContent = 'Loading…';
  document.getElementById('modal-meta').innerHTML = '';
  document.getElementById('modal-items').innerHTML = '<li style="color:var(--muted);font-size:14px">Loading…</li>';
  document.getElementById('modal-image').style.display = 'none';
  overlay.classList.add('open');

  try {
    const [boxRes, itemsRes] = await Promise.all([
      supaFetch(`/rest/v1/boxes?box_id=eq.${encodeURIComponent(boxId)}&limit=1`),
      supaFetch(`/rest/v1/items?box_id=eq.${encodeURIComponent(boxId)}&select=item_name,item_image_url&order=item_name`)
    ]);
    const boxes = await boxRes.json();
    const items = await itemsRes.json();
    const box = boxes[0];
    if (!box) return;

    document.getElementById('modal-title').textContent = box.description || boxId;
    document.getElementById('modal-meta').innerHTML = `
      ${box.location ? `<div class="modal-meta-item"><div class="modal-meta-label">Location</div><div class="modal-meta-value">${escHtml(box.location)}</div></div>` : ''}
      ${box.barcode ? `<div class="modal-meta-item"><div class="modal-meta-label">Barcode</div><div class="modal-meta-value">${escHtml(box.barcode)}</div></div>` : ''}
      <div class="modal-meta-item"><div class="modal-meta-label">Items</div><div class="modal-meta-value">${items.length}</div></div>
    `;

    if (box.box_image_url) {
      const img = document.getElementById('modal-image');
      img.src = box.box_image_url;
      img.style.display = 'block';
    }

    document.getElementById('modal-items').innerHTML = items.length
      ? items.map(i => `<li><span class="item-dot"></span>${escHtml(i.item_name)}</li>`).join('')
      : '<li style="color:var(--muted);font-size:14px">No items recorded</li>';

  } catch(e) {
    document.getElementById('modal-title').textContent = 'Error loading box';
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ─── BARCODE SCANNER ──────────────────────────────────────
async function toggleScanner() {
  const wrap = document.getElementById('scanner-wrap');
  if (wrap.style.display === 'block') { stopScanner(); return; }
  wrap.style.display = 'block';

  try {
    scannerStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }
    });
    const video = document.getElementById('scanner-video');
    video.srcObject = scannerStream;

    scannerInterval = setInterval(() => {
      const canvas = document.getElementById('scanner-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);
      if (code) {
        stopScanner();
        lookupBarcode(code.data);
      }
    }, 300);
  } catch(e) {
    stopScanner();
    alert('Camera access denied or not available. Please allow camera access and try again.');
  }
}

function stopScanner() {
  clearInterval(scannerInterval);
  if (scannerStream) {
    scannerStream.getTracks().forEach(t => t.stop());
    scannerStream = null;
  }
  document.getElementById('scanner-wrap').style.display = 'none';
}

async function lookupBarcode(barcode) {
  // Strip leading * if present
  const clean = barcode.replace(/^\*/, '');
  try {
    const res = await supaFetch(`/rest/v1/boxes?barcode=eq.${encodeURIComponent(clean)}&limit=1`);
    const data = await res.json();
    if (data.length) {
      openBox(data[0].box_id);
    } else {
      alert(`No box found for barcode: ${clean}`);
    }
  } catch(e) {
    alert('Error looking up barcode.');
  }
}

// ─── HELPERS ──────────────────────────────────────────────
function supaFetch(path, extra = {}) {
  const { headers: extraHeaders = {}, ...rest } = extra;
  return fetch(`${SUPABASE_URL}${path}`, {
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${authToken}`,
      'Content-Type': 'application/json',
      ...extraHeaders
    },
    ...rest
  });
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
